<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>JanGems — พลอยมงคลของคุณ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Trirong:wght@300;400;500;600&family=IBM+Plex+Sans+Thai:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* JanGems — Mystic Luxury */
:root {
  --jg-bg: #0E0A1A;
  --jg-bg-2: #1A1230;
  --jg-bg-3: #251A3E;
  --jg-ink: #F2EAD6;
  --jg-ink-dim: #A89B7E;
  --jg-ink-faint: #6B5F4A;
  --jg-gold: #D4A24C;
  --jg-gold-bright: #E9BD63;
  --jg-gold-dim: #8B6B2E;
  --jg-rose: #B8869C;
  --jg-line: rgba(212, 162, 76, 0.18);
  --jg-line-strong: rgba(212, 162, 76, 0.4);
  --font-display-en: 'Cormorant Garamond', serif;
  --font-display-th: 'Trirong', serif;
  --font-body: 'IBM Plex Sans Thai', 'IBM Plex Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--jg-bg);
  color: var(--jg-ink);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.7;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* Cosmic background — radial mist + subtle grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(212, 162, 76, 0.08), transparent 60%),
    radial-gradient(ellipse 80% 50% at 80% 100%, rgba(184, 134, 156, 0.06), transparent 60%),
    radial-gradient(ellipse 70% 60% at 10% 60%, rgba(122, 92, 158, 0.08), transparent 60%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.92  0 0 0 0 0.84  0 0 0 0.045 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
  opacity: 0.6;
  pointer-events: none;
  mix-blend-mode: overlay;
  z-index: 1;
}

#app {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding: 0;
  overflow: hidden;
}

/* ── Type ── */
.jg-display {
  font-family: var(--font-display-th);
  font-weight: 400;
  letter-spacing: 0.005em;
  line-height: 1.25;
  color: var(--jg-ink);
}
.jg-display-en {
  font-family: var(--font-display-en);
  font-weight: 400;
  font-style: italic;
  letter-spacing: 0.01em;
}
.jg-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--jg-gold);
  font-weight: 400;
}
.jg-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--jg-ink-dim);
}
.jg-gold { color: var(--jg-gold); }
.jg-dim { color: var(--jg-ink-dim); }

/* ── Top bar ── */
.jg-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  position: relative;
  z-index: 5;
}
.jg-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--jg-ink);
}
.jg-brand-mark {
  width: 22px;
  height: 22px;
}
.jg-brand-name {
  font-family: var(--font-display-en);
  font-style: italic;
  font-size: 18px;
  letter-spacing: 0.04em;
  color: var(--jg-ink);
}
.jg-brand-name b {
  font-weight: 600;
  font-style: normal;
  color: var(--jg-gold);
}

/* ── Buttons ── */
.jg-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 22px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.04em;
  border-radius: 999px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s ease;
  background: transparent;
  color: var(--jg-ink);
  text-decoration: none;
}
.jg-btn-primary {
  background: linear-gradient(180deg, var(--jg-gold-bright), var(--jg-gold));
  color: #1A1230;
  border-color: var(--jg-gold);
  box-shadow: 0 0 0 0 rgba(212, 162, 76, 0.4);
}
.jg-btn-primary:hover {
  box-shadow: 0 0 24px 0 rgba(212, 162, 76, 0.35);
}
.jg-btn-ghost {
  background: rgba(242, 234, 214, 0.04);
  border-color: var(--jg-line);
  color: var(--jg-ink);
}
.jg-btn-ghost:hover {
  background: rgba(242, 234, 214, 0.07);
  border-color: var(--jg-line-strong);
}
.jg-btn-icon {
  width: 40px; height: 40px; padding: 0; border-radius: 50%;
}

/* ── Progress ── */
.jg-progress {
  display: flex;
  gap: 6px;
  padding: 0 24px 8px;
}
.jg-progress-dot {
  flex: 1;
  height: 2px;
  background: rgba(242, 234, 214, 0.1);
  position: relative;
  overflow: hidden;
}
.jg-progress-dot.active::after,
.jg-progress-dot.done::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, var(--jg-gold-dim), var(--jg-gold));
  animation: jg-fillBar 0.6s ease forwards;
}
.jg-progress-dot.done::after { animation: none; transform: none; }
@keyframes jg-fillBar {
  from { transform: translateX(-100%); }
  to { transform: translateX(0); }
}

/* ── Quiz ── */
.jg-quiz {
  padding: 8px 24px 32px;
  min-height: calc(100vh - 80px);
  display: flex;
  flex-direction: column;
}
.jg-q-eyebrow {
  margin-top: 18px;
  margin-bottom: 14px;
}
.jg-q-title {
  font-family: var(--font-display-th);
  font-size: 28px;
  font-weight: 400;
  line-height: 1.3;
  margin-bottom: 28px;
  color: var(--jg-ink);
  text-wrap: pretty;
}
.jg-q-title em {
  font-family: var(--font-display-en);
  font-style: italic;
  color: var(--jg-gold);
  font-weight: 400;
}

.jg-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}
.jg-opt {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  background: rgba(242, 234, 214, 0.025);
  border: 1px solid var(--jg-line);
  border-radius: 14px;
  color: var(--jg-ink);
  font-size: 16px;
  font-weight: 400;
  cursor: pointer;
  transition: all 0.25s ease;
  text-align: left;
  font-family: var(--font-body);
  position: relative;
  overflow: hidden;
}
.jg-opt:hover {
  background: rgba(212, 162, 76, 0.06);
  border-color: var(--jg-line-strong);
  transform: translateX(2px);
}
.jg-opt.selected {
  background: rgba(212, 162, 76, 0.1);
  border-color: var(--jg-gold);
}
.jg-opt-num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--jg-gold-dim);
  letter-spacing: 0.1em;
  min-width: 22px;
}
.jg-opt-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.jg-opt-label {
  font-family: var(--font-display-th);
  font-size: 18px;
  color: var(--jg-ink);
  letter-spacing: 0.01em;
}
.jg-opt-sub {
  font-size: 12px;
  color: var(--jg-ink-dim);
  line-height: 1.5;
}
.jg-opt-arrow {
  color: var(--jg-gold-dim);
  opacity: 0;
  transition: all 0.2s ease;
}
.jg-opt:hover .jg-opt-arrow {
  opacity: 1;
  transform: translateX(2px);
}

/* Animal opt with icon */
.jg-opt-animal {
  align-items: flex-start;
  padding: 16px;
}
.jg-opt-animal-icon {
  width: 44px; height: 44px;
  flex-shrink: 0;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,162,76,0.15), rgba(212,162,76,0.02));
  border: 1px solid var(--jg-line);
  color: var(--jg-gold);
}

/* Back button */
.jg-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--jg-ink-dim);
  font-size: 13px;
  cursor: pointer;
  padding: 6px 0;
  font-family: var(--font-body);
  white-space: nowrap;
}
.jg-back:hover { color: var(--jg-ink); }
.jg-back:disabled { opacity: 0.3; cursor: not-allowed; }

/* Page transitions */
.jg-page-enter {
  animation: jgFadeUp 0.5s ease both;
}
@keyframes jgFadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Day chips (Q1) — special layout */
.jg-days {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.jg-day {
  padding: 18px 16px 20px;
  min-height: 104px;
  background: rgba(242, 234, 214, 0.025);
  border: 1px solid var(--jg-line);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: var(--font-body);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 8px;
  text-align: left;
}
.jg-day:hover {
  background: rgba(212, 162, 76, 0.06);
  border-color: var(--jg-line-strong);
}
.jg-day-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  box-shadow: 0 0 12px currentColor;
}
.jg-day-name {
  font-family: var(--font-display-th);
  font-size: 19px;
  color: var(--jg-ink);
  line-height: 1.3;
}
.jg-day-color {
  font-size: 11px;
  font-family: var(--font-mono);
  letter-spacing: 0.1em;
  color: var(--jg-ink-dim);
  text-transform: uppercase;
}

/* Footer hint */
.jg-q-hint {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--jg-line);
  font-size: 11px;
  color: var(--jg-ink-faint);
  font-family: var(--font-mono);
  letter-spacing: 0.15em;
  text-align: center;
  text-transform: uppercase;
}

/* ── Gem SVG container ── */
.jg-gem-wrap {
  position: relative;
  display: grid;
  place-items: center;
}
.jg-gem-glow {
  position: absolute;
  inset: -40%;
  background: radial-gradient(circle, var(--gem-glow, rgba(212,162,76,0.4)), transparent 60%);
  filter: blur(20px);
  pointer-events: none;
  animation: jgPulse 4s ease-in-out infinite;
}
@keyframes jgPulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.08); }
}
.jg-gem-svg {
  position: relative;
  z-index: 2;
  animation: jgFloat 6s ease-in-out infinite;
}
@keyframes jgFloat {
  0%, 100% { transform: translateY(0) rotate(0); }
  50%      { transform: translateY(-6px) rotate(2deg); }
}

/* ── Loading constellation ── */
.jg-loader {
  position: fixed;
  inset: 0;
  background: var(--jg-bg);
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  animation: jgFadeUp 0.4s ease;
}
.jg-loader-stage {
  position: relative;
  width: 220px;
  height: 220px;
}
.jg-constellation {
  position: absolute;
  inset: 0;
  animation: jgSpin 8s linear infinite;
}
@keyframes jgSpin {
  to { transform: rotate(360deg); }
}
.jg-constellation-2 {
  animation: jgSpin 12s linear infinite reverse;
}
.jg-loader-core {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
}
.jg-loader-core-inner {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--jg-gold-bright), var(--jg-gold) 40%, transparent 70%);
  filter: blur(2px);
  animation: jgPulse 2s ease-in-out infinite;
}
.jg-loader-text {
  font-family: var(--font-display-th);
  font-size: 22px;
  color: var(--jg-ink);
  letter-spacing: 0.02em;
}
.jg-loader-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--jg-gold-dim);
  text-transform: uppercase;
}
.jg-loader-dots {
  display: inline-flex;
  gap: 4px;
}
.jg-loader-dots span {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--jg-gold);
  animation: jgDot 1.4s ease-in-out infinite;
}
.jg-loader-dots span:nth-child(2) { animation-delay: 0.2s; }
.jg-loader-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes jgDot {
  0%, 60%, 100% { opacity: 0.2; }
  30% { opacity: 1; }
}

/* ── Result page ── */
.jg-result {
  padding: 8px 24px 0;
  position: relative;
  animation: jgFadeUp 0.8s ease both;
}
.jg-result-eyebrow {
  text-align: center;
  margin: 14px 0 6px;
}
.jg-result-porn {
  font-family: var(--font-display-th);
  font-size: 36px;
  font-weight: 400;
  text-align: center;
  color: var(--jg-ink);
  margin-bottom: 6px;
  letter-spacing: 0.01em;
  animation: jgFadeUp 0.8s 0.2s ease both;
}
.jg-result-porn-en {
  font-family: var(--font-display-en);
  font-style: italic;
  color: var(--jg-gold);
  font-size: 32px;
}
.jg-result-meta {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--jg-ink-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
  animation: jgFadeUp 0.8s 0.3s ease both;
}
.jg-result-meta b {
  color: var(--jg-gold);
  font-weight: 500;
}
.jg-result-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 18px 0;
  color: var(--jg-gold-dim);
}
.jg-result-divider::before,
.jg-result-divider::after {
  content: '';
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--jg-gold-dim), transparent);
}

.jg-result-hero {
  display: grid;
  place-items: center;
  padding: 24px 0 32px;
  animation: jgFadeUp 1s 0.4s ease both;
}

.jg-result-section {
  border-top: 1px solid var(--jg-line);
  padding: 28px 0;
  animation: jgFadeUp 0.8s ease both;
}
.jg-result-section:nth-of-type(1) { animation-delay: 0.5s; }
.jg-result-section:nth-of-type(2) { animation-delay: 0.6s; }
.jg-result-section:nth-of-type(3) { animation-delay: 0.7s; }

.jg-rs-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--jg-gold);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.jg-rs-label::before {
  content: '';
  width: 18px;
  height: 1px;
  background: var(--jg-gold);
}
.jg-rs-title {
  font-family: var(--font-display-th);
  font-size: 24px;
  color: var(--jg-ink);
  margin-top: 4px;
  margin-bottom: 10px;
  font-weight: 400;
  line-height: 1.35;
}
.jg-rs-title-with-icon {
  margin-top: 10px;
}
.jg-rs-desc {
  color: var(--jg-ink-dim);
  font-size: 14px;
  line-height: 1.7;
}

.jg-gem-row {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.jg-gem-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: rgba(212, 162, 76, 0.06);
  border: 1px solid var(--jg-line);
  border-radius: 999px;
  font-family: var(--font-display-th);
  font-size: 14px;
  color: var(--jg-ink);
}
.jg-gem-chip-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  box-shadow: 0 0 8px currentColor;
}

.jg-quote {
  font-family: var(--font-display-en);
  font-style: italic;
  font-size: 18px;
  color: var(--jg-gold);
  margin-top: 12px;
  padding-left: 14px;
  border-left: 1px solid var(--jg-gold-dim);
  line-height: 1.5;
}
.jg-quote-th {
  font-family: var(--font-display-th);
  font-style: normal;
  font-size: 17px;
  color: var(--jg-ink);
  line-height: 1.6;
  margin-top: 4px;
}

/* ── Share row ── */
.jg-share-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 24px;
}
.jg-share-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 16px 10px;
  background: rgba(242, 234, 214, 0.025);
  border: 1px solid var(--jg-line);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--jg-ink);
  font-family: var(--font-body);
  font-size: 12px;
}
.jg-share-btn:hover {
  background: rgba(212, 162, 76, 0.08);
  border-color: var(--jg-line-strong);
}
.jg-share-icon {
  width: 26px; height: 26px;
  display: grid; place-items: center;
  color: var(--jg-gold);
}

/* CTA card */
.jg-cta-card {
  margin: 32px 0;
  padding: 28px 24px;
  background:
    radial-gradient(ellipse at top, rgba(212, 162, 76, 0.12), transparent 60%),
    rgba(26, 18, 48, 0.6);
  border: 1px solid var(--jg-line-strong);
  border-radius: 18px;
  text-align: center;
}
.jg-cta-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--jg-gold);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.jg-cta-title {
  font-family: var(--font-display-th);
  font-size: 22px;
  color: var(--jg-ink);
  margin-bottom: 16px;
  line-height: 1.4;
}
.jg-cta-list {
  text-align: left;
  margin-bottom: 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.jg-cta-list-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 14px;
  color: var(--jg-ink);
  line-height: 1.6;
}
.jg-cta-check {
  color: var(--jg-gold);
  flex-shrink: 0;
  margin-top: 2px;
}
.jg-cta-list-item small {
  display: block;
  font-size: 12px;
  color: var(--jg-ink-dim);
  margin-top: 2px;
}
.jg-cta-fineprint {
  margin-top: 12px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--jg-ink-faint);
  text-transform: uppercase;
}

/* ── Modal ── */
.jg-modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(14, 10, 26, 0.85);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: grid;
  place-items: center;
  padding: 20px;
  animation: jgFadeIn 0.3s ease;
}
@keyframes jgFadeIn { from { opacity: 0; } to { opacity: 1; } }
.jg-modal {
  width: 100%;
  max-width: 420px;
  background: linear-gradient(180deg, var(--jg-bg-2), var(--jg-bg));
  border: 1px solid var(--jg-line-strong);
  border-radius: 20px;
  padding: 28px 24px;
  position: relative;
  animation: jgFadeUp 0.4s ease both;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.jg-modal-close {
  position: absolute;
  top: 14px; right: 14px;
  width: 32px; height: 32px;
  border-radius: 50%;

function lighten(hex, amt) {
  const c = parseInt(hex.slice(1), 16);
  const r = Math.min(255, ((c >> 16) & 255) + amt);
  const g = Math.min(255, ((c >> 8) & 255) + amt);
  const b = Math.min(255, (c & 255) + amt);
  return `rgb(${r},${g},${b})`;
}

function Modal({ onClose }) {
  const [form, setForm] = useState({ name: '', phone: '', line: '' });
  const [done, setDone] = useState(false);

  const submit = (e) => {
    e.preventDefault();
    if (!form.name || form.phone.length < 9) return;
    setDone(true);
  };

  if (done) {
    return (
      <div className="jg-modal-backdrop" onClick={onClose}>
        <div className="jg-modal" onClick={e=>e.stopPropagation()}>
          <button className="jg-modal-close" onClick={onClose}><Icon.Close/></button>
          <div className="jg-success">
            <div className="jg-success-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D4A24C" strokeWidth="1.5">
                <path d="M12 2l2.5 6L21 9l-5 4.5L17.5 20 12 17l-5.5 3L8 13.5 3 9l6.5-1z" fill="#D4A24C" fillOpacity="0.2"/>
              </svg>
            </div>
            <div className="jg-eyebrow" style={{marginBottom:8}}>welcome</div>
            <h3 className="jg-modal-title">ยินดีต้อนรับ คุณ{form.name}</h3>
            <p className="jg-modal-sub">
              Profile ของคุณกำลังเตรียมพร้อม<br/>
              แจนจะส่งรายละเอียดพลอยเสริมครบ 9 ด้าน<br/>
              ทาง LINE ภายใน 24 ชั่วโมง
            </p>
            <div className="jg-success-preview">
              <div className="jg-success-preview-grid">
                {[...Array(9)].map((_,i)=><div key={i} className="jg-success-preview-cell"></div>)}
              </div>
              <div className="jg-success-preview-overlay">9 gems unlocked</div>
            </div>
            <button className="jg-btn jg-btn-ghost" onClick={onClose} style={{marginTop:20,width:'100%'}}>
              กลับสู่หน้าหลัก
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="jg-modal-backdrop" onClick={onClose}>
      <div className="jg-modal" onClick={e=>e.stopPropagation()}>
        <button className="jg-modal-close" onClick={onClose}><Icon.Close/></button>
        <div className="jg-modal-eyebrow jg-eyebrow">Create profile</div>
        <h3 className="jg-modal-title">Profile ของคุณ</h3>
        <p className="jg-modal-sub">ใช้เวลา 30 วินาที · ฟรี ตลอดชีพ</p>
        <form onSubmit={submit}>
          <div className="jg-field">
            <label>ชื่อเล่น</label>
            <input type="text" placeholder="แอน, นิว, มาย…" value={form.name}
                   onChange={e=>setForm({...form,name:e.target.value})}/>
          </div>
          <div className="jg-field">
            <label>เบอร์โทร</label>
            <input type="tel" maxLength="10" placeholder="08x xxx xxxx" value={form.phone}
                   onChange={e=>setForm({...form,phone:e.target.value.replace(/\D/g,'')})}/>
          </div>
          <div className="jg-field">
            <label>LINE ID (ถ้ามี)</label>
            <input type="text" placeholder="@yourline" value={form.line}
                   onChange={e=>setForm({...form,line:e.target.value})}/>
          </div>
          <button type="submit" className="jg-btn jg-btn-primary">
            <Icon.Sparkle/> สร้าง Profile ของฉัน
          </button>
          <p className="jg-modal-fineprint">
            ข้อมูลของคุณปลอดภัย ใช้เพื่อส่ง profile<br/>
            และคำแนะนำเฉพาะที่คุณสนใจเท่านั้น
          </p>
        </form>
      </div>
    </div>
  );
}

function App() {
  const [step, setStep] = useState('welcome');
  const [answers, setAnswers] = useState(() => {
    try { return JSON.parse(localStorage.getItem('jg-answers') || '{}'); }
    catch { return {}; }
  });
  const [modalOpen, setModalOpen] = useState(false);

  useEffect(() => {
    localStorage.setItem('jg-answers', JSON.stringify(answers));
  }, [answers]);

  useEffect(() => {
    if (answers.day && answers.animal && answers.desire) {
      if (step === 'welcome') setStep('result');
    }
  // eslint-disable-next-line
  }, []);

  const goQ1 = () => setStep('q1');
  const pickDay    = id => { setAnswers(a=>({...a,day:id}));    setStep('q2'); };
  const pickAnimal = id => { setAnswers(a=>({...a,animal:id})); setStep('q3'); };
  const pickDesire = id => {
    setAnswers(a=>({...a,desire:id}));
    setStep('loading');
    setTimeout(()=>setStep('result'), 2200);
  };

  const back = () => {
    if (step === 'q1') setStep('welcome');
    else if (step === 'q2') setStep('q1');
    else if (step === 'q3') setStep('q2');
  };

  const restart = () => {
    setAnswers({});
    localStorage.removeItem('jg-answers');
    setStep('welcome');
  };

  const onShare = (kind) => {
    const url = window.location.href;
    if (kind === 'line') window.open(`https://line.me/R/msg/text/?${encodeURIComponent('ผลทำนายพลอยมงคลของฉัน '+url)}`, '_blank');
    else if (kind === 'fb') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
    else alert('กำลังเตรียมรูปสำหรับ IG Story…');
  };

  const stepIndex = step === 'q1' ? 0 : step === 'q2' ? 1 : step === 'q3' ? 2 : -1;

  return (
    <div data-screen-label={`JanGems ${step}`}>
      <div className="jg-topbar">
        <Brand/>
        {(step !== 'welcome' && step !== 'loading') && (
          <button className="jg-back" onClick={restart} style={{fontSize:11,letterSpacing:'.15em',textTransform:'uppercase'}}>
            ↺ ทำใหม่
          </button>
        )}
      </div>

      {stepIndex >= 0 && <Progress step={stepIndex}/>}

      {step === 'welcome' && <Welcome onStart={goQ1}/>}
      {step === 'q1' && <Q1 onPick={pickDay} onBack={back}/>}
      {step === 'q2' && <Q2 onPick={pickAnimal} onBack={back}/>}
      {step === 'q3' && <Q3 onPick={pickDesire} onBack={back}/>}
      {step === 'loading' && <Loader/>}
      {step === 'result' && (
        <Result
          answers={answers}
          onSignup={()=>setModalOpen(true)}
          onShare={onShare}
          onRestart={restart}
        />
      )}

      {modalOpen && <Modal onClose={()=>setModalOpen(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
